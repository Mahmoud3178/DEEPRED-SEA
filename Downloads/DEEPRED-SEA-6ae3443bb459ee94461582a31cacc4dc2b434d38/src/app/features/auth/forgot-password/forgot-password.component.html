<div class="min-vh-100 d-flex align-items-center justify-content-center p-4"
     style="background:linear-gradient(160deg,#001d32 0%,#003d6b 50%,#005d90 100%);">
  <div class="card-premium p-5 animate-fadeInUp" style="width:100%;max-width:440px;border-radius:2rem;">

    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
           style="width:64px;height:64px;background:linear-gradient(135deg,#005d90,#0077b6);">
        <span class="material-symbols-outlined text-white" style="font-size:1.8rem;">lock_reset</span>
      </div>
      <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.5rem;color:var(--on-surface);">
        Forgot Password?
      </h2>
      <p style="color:var(--on-surface-variant);font-size:.9rem;line-height:1.6;">
        Enter your email and we'll send you a reset link.
      </p>
    </div>

    <!-- Success state -->
    <div *ngIf="success" class="text-center animate-fadeInUp">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
           style="width:64px;height:64px;background:rgba(0,103,125,.12);">
        <span class="material-symbols-outlined" style="color:var(--secondary);font-size:2rem;font-variation-settings:'FILL' 1;">mark_email_read</span>
      </div>
      <h5 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:var(--on-surface);">Check your inbox!</h5>
      <p style="color:var(--on-surface-variant);font-size:.875rem;">
        We sent a password reset link to <strong>{{form.value.email}}</strong>
      </p>
      <a routerLink="/auth/login" class="btn-primary-gradient text-decoration-none d-inline-flex align-items-center gap-2 px-5 py-2 mt-2">
        Back to Login
      </a>
    </div>

    <!-- Form -->
    <form *ngIf="!success" [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-4">
        <label style="font-size:.83rem;font-weight:600;color:var(--on-surface);" class="form-label">Email address</label>
        <div class="position-relative">
          <span class="material-symbols-outlined position-absolute"
                style="left:14px;top:50%;transform:translateY(-50%);color:var(--outline);font-size:1.1rem;">email</span>
          <input formControlName="email" type="email" placeholder="your@email.com"
            class="form-control-tonal w-100 ps-5"
            [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
        </div>
        <div class="text-danger mt-1" style="font-size:.75rem;"
             *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Please enter a valid email
        </div>
      </div>

      <!-- API Error -->
      <div *ngIf="error" class="d-flex align-items-center gap-2 p-3 rounded-3 mb-3"
           style="background:var(--error-container);color:var(--error);font-size:.85rem;font-weight:600;">
        <span class="material-symbols-outlined" style="font-size:1rem;">error</span>
        {{error}}
      </div>

      <button type="submit" [disabled]="loading"
        class="btn-primary-gradient w-100 py-3 d-flex align-items-center justify-content-center gap-2">
        <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
        <span *ngIf="!loading" class="material-symbols-outlined" style="font-size:1rem;">send</span>
        {{loading ? 'Sending...' : 'Send Reset Link'}}
      </button>

      <p class="text-center mt-3" style="color:var(--on-surface-variant);font-size:.875rem;">
        Remember your password?
        <a routerLink="/auth/login" style="color:var(--primary);font-weight:700;text-decoration:none;">Sign in</a>
      </p>
    </form>
  </div>
</div>
