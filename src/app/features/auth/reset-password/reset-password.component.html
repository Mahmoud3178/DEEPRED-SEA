<div class="min-vh-100 d-flex align-items-center justify-content-center p-4"
     style="background:linear-gradient(160deg,#001d32 0%,#003d6b 50%,#005d90 100%);">
  <div class="card-premium p-5 animate-fadeInUp" style="width:100%;max-width:440px;border-radius:2rem;">

    <!-- Success state -->
    <div *ngIf="success" class="text-center animate-fadeInUp">
      <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
           style="width:64px;height:64px;background:rgba(0,103,125,.12);">
        <span class="material-symbols-outlined"
              style="color:var(--secondary);font-size:2rem;font-variation-settings:'FILL' 1;">
          check_circle
        </span>
      </div>
      <h5 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:var(--on-surface);">
        Password Reset!
      </h5>
      <p style="color:var(--on-surface-variant);font-size:.875rem;">
        Your password has been updated successfully. Redirecting to login...
      </p>
    </div>

    <!-- Invalid token -->
    <div *ngIf="!success && !token" class="text-center">
      <span class="material-symbols-outlined d-block mb-3"
            style="font-size:3rem;color:var(--error);">error</span>
      <h5 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;color:var(--on-surface);">
        Invalid Link
      </h5>
      <p style="color:var(--on-surface-variant);font-size:.875rem;">{{error}}</p>
      <a routerLink="/auth/forgot-password"
         class="btn-primary-gradient text-decoration-none d-inline-flex align-items-center gap-2 px-4 py-2 mt-2">
        Request New Link
      </a>
    </div>

    <!-- Form -->
    <div *ngIf="!success && token">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
             style="width:64px;height:64px;background:linear-gradient(135deg,#005d90,#0077b6);">
          <span class="material-symbols-outlined text-white" style="font-size:1.8rem;">lock_reset</span>
        </div>
        <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.5rem;color:var(--on-surface);">
          Set New Password
        </h2>
        <p style="color:var(--on-surface-variant);font-size:.9rem;">
          Enter your new password below.
        </p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <!-- New Password -->
        <div class="mb-3">
          <label style="font-size:.83rem;font-weight:600;color:var(--on-surface);" class="form-label">
            New Password
          </label>
          <div class="position-relative">
            <span class="material-symbols-outlined position-absolute"
                  style="left:14px;top:50%;transform:translateY(-50%);color:var(--outline);font-size:1.1rem;">
              lock
            </span>
            <input formControlName="newPassword" [type]="showNew ? 'text' : 'password'"
              placeholder="Min. 6 characters"
              class="form-control-tonal w-100 ps-5 pe-5"
              [class.is-invalid]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
            <button type="button" (click)="showNew=!showNew"
              class="position-absolute border-0 bg-transparent"
              style="right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--outline);">
              <span class="material-symbols-outlined" style="font-size:1.1rem;">
                {{showNew ? 'visibility_off' : 'visibility'}}
              </span>
            </button>
          </div>
          <div class="text-danger mt-1" style="font-size:.75rem;"
               *ngIf="form.get('newPassword')?.invalid && form.get('newPassword')?.touched">
            Minimum 6 characters required
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label style="font-size:.83rem;font-weight:600;color:var(--on-surface);" class="form-label">
            Confirm Password
          </label>
          <div class="position-relative">
            <span class="material-symbols-outlined position-absolute"
                  style="left:14px;top:50%;transform:translateY(-50%);color:var(--outline);font-size:1.1rem;">
              lock
            </span>
            <input formControlName="confirmPassword" [type]="showConfirm ? 'text' : 'password'"
              placeholder="Repeat your password"
              class="form-control-tonal w-100 ps-5 pe-5"
              [class.is-invalid]="form.get('confirmPassword')?.invalid && form.get('confirmPassword')?.touched">
            <button type="button" (click)="showConfirm=!showConfirm"
              class="position-absolute border-0 bg-transparent"
              style="right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--outline);">
              <span class="material-symbols-outlined" style="font-size:1.1rem;">
                {{showConfirm ? 'visibility_off' : 'visibility'}}
              </span>
            </button>
          </div>
        </div>

        <!-- Error -->
        <div *ngIf="error" class="d-flex align-items-center gap-2 p-3 rounded-3 mb-3"
             style="background:var(--error-container);color:var(--error);font-size:.85rem;font-weight:600;">
          <span class="material-symbols-outlined" style="font-size:1rem;">error</span>
          {{error}}
        </div>

        <button type="submit" [disabled]="loading"
          class="btn-primary-gradient w-100 py-3 d-flex align-items-center justify-content-center gap-2">
          <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
          <span *ngIf="!loading" class="material-symbols-outlined" style="font-size:1rem;">check_circle</span>
          {{loading ? 'Resetting...' : 'Reset Password'}}
        </button>

        <p class="text-center mt-3" style="color:var(--on-surface-variant);font-size:.875rem;">
          <a routerLink="/auth/login"
             style="color:var(--primary);font-weight:700;text-decoration:none;">
            Back to Login
          </a>
        </p>
      </form>
    </div>
  </div>
</div>
