<div class="otp-page">
  <div class="card-premium otp-card animate-fadeInUp">

    <div class="otp-icon-wrap">
      <span class="material-symbols-outlined otp-icon">mail</span>
    </div>

    <h2 class="otp-title">Verify your email</h2>
    <p class="otp-subtitle">
      We sent a 6-digit code to<br>
      <strong>{{ email }}</strong>
    </p>

<<div class="otp-inputs" (paste)="onPaste($event)">
      <input id="otp-0" type="text" inputmode="numeric" maxlength="1"
        autocomplete="one-time-code" class="otp-digit-input"
        (input)="onDigitInput(0, $event)" (keydown)="onKeydown(0, $event)">

      <input id="otp-1" type="text" inputmode="numeric" maxlength="1"
        autocomplete="one-time-code" class="otp-digit-input"
        (input)="onDigitInput(1, $event)" (keydown)="onKeydown(1, $event)">

      <input id="otp-2" type="text" inputmode="numeric" maxlength="1"
        autocomplete="one-time-code" class="otp-digit-input"
        (input)="onDigitInput(2, $event)" (keydown)="onKeydown(2, $event)">

      <input id="otp-3" type="text" inputmode="numeric" maxlength="1"
        autocomplete="one-time-code" class="otp-digit-input"
        (input)="onDigitInput(3, $event)" (keydown)="onKeydown(3, $event)">

      <input id="otp-4" type="text" inputmode="numeric" maxlength="1"
        autocomplete="one-time-code" class="otp-digit-input"
        (input)="onDigitInput(4, $event)" (keydown)="onKeydown(4, $event)">

      <input id="otp-5" type="text" inputmode="numeric" maxlength="1"
        autocomplete="one-time-code" class="otp-digit-input"
        (input)="onDigitInput(5, $event)" (keydown)="onKeydown(5, $event)">
    </div>

    <div *ngIf="error" class="otp-error">
      <span class="material-symbols-outlined" style="font-size:1rem;">error</span>
      {{ error }}
    </div>

    <div *ngIf="resendSuccess" class="otp-success">
      <span class="material-symbols-outlined" style="font-size:1rem;">check_circle</span>
      Code resent successfully!
    </div>

    <button (click)="submit()" [disabled]="loading || otpCode.length !== 6"
      class="btn-primary-gradient w-100 py-3 d-flex align-items-center justify-content-center gap-2 mt-3">
      <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
      <span *ngIf="!loading">Verify & Continue</span>
      <span *ngIf="loading">Verifying...</span>
    </button>

    <p class="otp-resend-text">
      Didn't receive the code?
      <button (click)="resend()" [disabled]="resendCooldown > 0" class="otp-resend-btn">
        {{ resendCooldown > 0 ? 'Resend in ' + resendCooldown + 's' : 'Resend Code' }}
      </button>
    </p>
  </div>
</div>
